<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel VidYou</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .painel { width: 90%; max-width: 400px; background: #1a1a1a; padding: 25px; border-radius: 12px; border: 2px solid #ff4500; box-shadow: 0 0 15px #ff450044; }
        h1 { color: #ff4500; text-align: center; font-size: 1.4rem; margin-bottom: 25px; text-transform: uppercase; letter-spacing: 1px; }
        label { font-size: 0.75rem; color: #ff4500; font-weight: bold; margin-bottom: 5px; display: block; }
        input, textarea { width: 100%; padding: 12px; margin-bottom: 15px; background: #000; border: 1px solid #333; color: #fff; border-radius: 6px; box-sizing: border-box; outline: none; }
        input:focus { border-color: #ff4500; }
        button { width: 100%; padding: 15px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 6px; margin-top: 5px; font-size: 1rem; }
        button:hover { background: #e63e00; }
        #msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 20px; }
    </style>
</head>
<body>
<div class="painel">
    <h1>EMISSOR VIDYOU PRO</h1>
    
    <label>ID DE ACESSO</label>
    <input type="password" id="acessoID" value="netchaveapi">

    <label>GITHUB TOKEN</label>
    <input type="text" id="ghToken" placeholder="Cole seu novo ghp_ aqui">

    <label>REPOSITÓRIO</label>
    <input type="text" id="ghRepo" value="roneiltonsouza/vidyou-iptv">

    <label>LINK DA LISTA M3U</label>
    <textarea id="m3uLink" rows="4" placeholder="Cole o link da lista M3U"></textarea>

    <button onclick="atualizar()">ATUALIZAR SISTEMA</button>
    <div id="msg"></div>
</div>

<script>
    async function atualizar() {
        const acesso = document.getElementById('acessoID').value;
        const token = document.getElementById('ghToken').value.trim();
        const repo = document.getElementById('ghRepo').value;
        const link = document.getElementById('m3uLink').value.trim();
        const msg = document.getElementById('msg');

        if (acesso !== "netchaveapi") { 
            msg.style.color = "red";
            msg.innerText = "❌ ID INCORRETO!";
            return;
        }

        if (!token) {
            msg.style.color = "orange";
            msg.innerText = "⚠️ Insira o seu novo Token!";
            return;
        }

        try {
            msg.style.color = "#ff4500";
            msg.innerText = "⏳ Conectando ao GitHub...";
            const url = `https://api.github.com/repos/${repo}/contents/lista.txt`;
            
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const data = await res.json();
            
            if (res.status === 401) {
                msg.style.color = "red";
                msg.innerText = "❌ Token Inválido ou Bloqueado!";
                return;
            }

            const update = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    message: "Update VidYou List", 
                    content: btoa(unescape(encodeURIComponent(link))), 
                    sha: data.sha 
                })
            });

            if (update.ok) {
                msg.style.color = "#00ff00";
                msg.innerText = "✅ LISTA SINCRONIZADA!";
            } else {
                msg.style.color = "red";
                msg.innerText = "❌ Erro ao atualizar arquivo.";
            }
        } catch (e) { 
            msg.style.color = "red";
            msg.innerText = "❌ Falha na comunicação."; 
        }
    }
</script>
</body>
</html>
