<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel VidYou - Configurado</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; display: flex; justify-content: center; padding: 20px; }
        .painel { width: 100%; max-width: 500px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 1px solid #ff4500; }
        h1 { color: #ff4500; text-align: center; font-size: 1.2rem; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; background: #111; border: 1px solid #444; color: #fff; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

<div class="painel">
    <h1>PAINEL DE ENVIO</h1>
    
    <input type="text" id="apiToken" placeholder="Token de Acesso (Ex: ghp_...)">
    
    <input type="text" id="apiId" value="NB_29FBD53F0BF41F787C975E1B018EA24F" readonly>
    
    <textarea id="m3uUrl" placeholder="Cole o link URL HTTPS da sua lista M3U aqui"></textarea>
    
    <button onclick="enviarParaAPI()">ATUALIZAR TODOS OS USUÁRIOS</button>
    <div id="msg" style="margin-top:15px; text-align:center;"></div>
</div>

<script>
    async function enviarParaAPI() {
        const token = document.getElementById('apiToken').value;
        const apiId = document.getElementById('apiId').value;
        const m3uUrl = document.getElementById('m3uUrl').value;
        const msg = document.getElementById('msg');

        if(!m3uUrl.startsWith("https")) return alert("O link deve ser um HTTPS válido!");

        msg.innerText = "Enviando para API...";

        // Estrutura de envio conforme a sua arquitetura
        try {
            const response = await fetch('https://api.github.com/repos/roneiltonsouza/vidyou-iptv/contents/lista.txt', {
                method: 'PUT',
                headers: {
                    'Authorization': `token ${token}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    message: "Atualização via API: " + apiId,
                    content: btoa(m3uUrl), // Envia a URL codificada conforme o esperado
                    sha: "SUA_SHA_AQUI" // Nota: O sistema precisa da SHA do arquivo atual para sobrescrever
                })
            });

            if(response.ok) {
                msg.innerText = "✅ Sincronizado com a API!";
            } else {
                msg.innerText = "❌ Erro ao comunicar com a API.";
            }
        } catch (e) {
            msg.innerText = "Erro: " + e.message;
        }
    }
</script>
</body>
</html>
