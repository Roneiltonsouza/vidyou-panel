<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou Panel</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; overflow-x: hidden; }
        .box { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #ff4500; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        
        /* Container do item da lista */
        .item-wrapper {
            position: relative;
            margin-bottom: 10px;
            overflow: hidden;
            border-radius: 5px;
            background: #ff0000; /* Cor do fundo ao arrastar (Delete) */
        }

        /* Botão de excluir que fica atrás */
        .btn-delete {
            position: absolute;
            right: 0;
            top: 0;
            height: 100%;
            width: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
        }

        /* O card que realmente desliza */
        .card-lista {
            position: relative;
            background: #1a1a1a;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.3s ease;
            z-index: 2;
            touch-action: pan-y; /* Permite scroll vertical normal */
        }

        .sync-btn { width: auto; padding: 8px 15px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>VIDYOU PANEL</h2>
    <p>Gerencie suas listas e sincronize com o App.</p>
    <input type="text" id="nome" placeholder="Nome da Lista (Ex: Minha Lista)">
    <input type="text" id="url" placeholder="URL da Lista M3U">
    <button onclick="salvar()">SALVAR LISTA</button>
</div>

<div class="lista-salva" id="container"></div>

<script>
    const APP_URL = "https://roneiltonsouza.github.io/vidyou-iptv/";

    function salvar() {
        const nome = document.getElementById('nome').value;
        const url = document.getElementById('url').value;
        if(!nome || !url) return alert("Preencha tudo!");

        let listas = JSON.parse(localStorage.getItem('v-listas') || '[]');
        listas.push({ id: Date.now(), nome, url }); // Adicionado ID para facilitar exclusão
        localStorage.setItem('v-listas', JSON.stringify(listas));
        
        document.getElementById('nome').value = '';
        document.getElementById('url').value = '';
        carregar();
    }

    function excluir(id) {
        let listas = JSON.parse(localStorage.getItem('v-listas') || '[]');
        listas = listas.filter(l => l.id !== id);
        localStorage.setItem('v-listas', JSON.stringify(listas));
        carregar();
    }

    function sincronizar(urlLista) {
        const destino = APP_URL + "?lista=" + encodeURIComponent(urlLista);
        window.open(destino, '_blank');
    }

    function carregar() {
        const listas = JSON.parse(localStorage.getItem('v-listas') || '[]');
        const container = document.getElementById('container');
        
        container.innerHTML = listas.map(l => `
            <div class="item-wrapper">
                <div class="btn-delete" onclick="excluir(${l.id})">EXCLUIR</div>
                <div class="card-lista" 
                     ontouchstart="handleTouchStart(event)" 
                     ontouchmove="handleTouchMove(event)" 
                     ontouchend="handleTouchEnd(event)">
                    <span>${l.nome}</span>
                    <button class="sync-btn" onclick="sincronizar('${l.url}')">ABRIR</button>
                </div>
            </div>
        `).join('');
    }

    // Lógica do Swipe (Arraste)
    let startX = 0;
    let currentElement = null;

    function handleTouchStart(e) {
        startX = e.touches[0].clientX;
        currentElement = e.currentTarget;
        currentElement.style.transition = 'none';
    }

    function handleTouchMove(e) {
        let moveX = e.touches[0].clientX - startX;
        // Só permite arrastar para a esquerda e limita a 80px
        if (moveX < 0 && moveX > -100) {
            currentElement.style.transform = `translateX(${moveX}px)`;
        }
    }

    function handleTouchEnd(e) {
        currentElement.style.transition = 'transform 0.3s ease';
        let finalX = e.changedTouches[0].clientX - startX;

        if (finalX < -50) {
            // Se arrastou mais de 50px, fixa o botão de excluir
            currentElement.style.transform = 'translateX(-80px)';
        } else {
            // Se não, volta ao normal
            currentElement.style.transform = 'translateX(0)';
        }
    }

    window.onload = carregar;
</script>
</body>
</html>
