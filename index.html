<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VidYou Panel PRO</title>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: sans-serif; padding: 20px; }
        .box { background: #111; padding: 20px; border-radius: 10px; border: 1px solid #333; margin-bottom: 20px; border-top: 4px solid #ff4500; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; border-radius: 5px; box-sizing: border-box; }
        button.btn-add { width: 100%; padding: 15px; background: #ff4500; color: #000; font-weight: bold; border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; }
        
        /* Estrutura igual à versão que funciona */
        .card-wrapper { position: relative; width: 100%; height: 60px; margin-bottom: 10px; overflow: hidden; background: #1a1a1a; border-radius: 5px; }
        .delete-btn { position: absolute; right: 0; top: 0; bottom: 0; background: #ff0000; color: white; border: none; width: 80px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 1.2rem; }
        .card-lista { 
            position: absolute; left: 0; top: 0; width: 100%; height: 100%; 
            background: #1a1a1a; padding: 0 15px; box-sizing: border-box;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 2; transition: transform 0.3s ease; border-left: 4px solid #ff4500;
        }
        .sync-btn { padding: 8px 15px; font-size: 0.9rem; background: #ff4500; color: #000; font-weight: bold; border: none; border-radius: 4px; cursor: pointer; }
        h2 { color: #ff4500; margin: 0 0 15px 0; text-align: center; }
    </style>
</head>
<body>

<div class="box">
    <h2>VIDYOU PANEL</h2>
    <input type="text" id="nome" placeholder="Nome da Lista">
    <input type="text" id="url" placeholder="URL da Lista M3U">
    <button class="btn-add" onclick="salvar()">SALVAR LISTA</button>
</div>

<div class="lista-salva" id="container"></div>

<script>
    const APP_URL = "https://roneiltonsouza.github.io/vidyou-iptv/";

    function salvar() {
        const nome = document.getElementById('nome').value;
        const url = document.getElementById('url').value;
        if(!nome || !url) return alert("Preencha tudo!");

        let listas = JSON.parse(localStorage.getItem('v-listas') || '[]');
        listas.push({ nome, url });
        localStorage.setItem('v-listas', JSON.stringify(listas));
        location.reload();
    }

    function deletar(index) {
        let listas = JSON.parse(localStorage.getItem('v-listas') || '[]');
        listas.splice(index, 1);
        localStorage.setItem('v-listas', JSON.stringify(listas));
        location.reload();
    }

    // Mantive a lógica original de envio que você confirmou que funciona
    function sincronizar(urlLista) {
        const destino = APP_URL + "?lista=" + encodeURIComponent(urlLista);
        window.open(destino, '_blank');
    }

    function carregar() {
        const listas = JSON.parse(localStorage.getItem('v-listas') || '[]');
        const container = document.getElementById('container');
        
        container.innerHTML = listas.map((l, index) => `
            <div class="card-wrapper">
                <button class="delete-btn" onclick="deletar(${index})">🗑️</button>
                <div class="card-lista" id="card-${index}" 
                     ontouchstart="startDrag(event, ${index})" 
                     ontouchend="endDrag(event, ${index})">
                    <span>${l.nome}</span>
                    <button class="sync-btn" onclick="sincronizar('${l.url}')">ABRIR</button>
                </div>
            </div>
        `).join('');
    }

    let startX = 0;
    function startDrag(e, index) { startX = e.touches[0].clientX; }

    function endDrag(e, index) {
        let endX = e.changedTouches[0].clientX;
        const card = document.getElementById('card-' + index);
        if (startX - endX > 50) {
            card.style.transform = "translateX(-80px)";
        } else {
            card.style.transform = "translateX(0)";
        }
    }

    window.onload = carregar;
</script>
</body>
</html>
