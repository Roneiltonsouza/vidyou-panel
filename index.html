<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VidYou</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 10px 0; background: #222; color: #fff; border: 1px solid #444; }
        button { width: 100%; padding: 15px; background: #ff4500; color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .card { background: #222; padding: 15px; margin-top: 20px; border-radius: 8px; border-left: 5px solid #ff4500; }
    </style>
</head>
<body>
    <h2>MEU PAINEL IPTV</h2>
    <input type="text" id="url" placeholder="Cole aqui o link .m3u da sua lista">
    <button onclick="sincronizar()">SINCRONIZAR COM PLAYER</button>

    <div id="resultado"></div>

<script>
    // VERIFIQUE SE ESTE LINK ABAIXO É O DO SEU PLAYER
    const MEU_PLAYER = "https://roneiltonsouza.github.io/vidyou-iptv/";

    function sincronizar() {
        const urlLista = document.getElementById('url').value;
        if (!urlLista) return alert("Cole uma URL primeiro!");

        // Criando o link final que envia a lista para o player
        const linkFinal = MEU_PLAYER + "?lista=" + encodeURIComponent(urlLista);
        
        // Abre o player em uma nova aba enviando a lista
        window.open(linkFinal, '_blank');
    }
</script>
</body>
</html>
