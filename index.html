<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel VidYou</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .painel { width: 90%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 2px solid #ff4500; }
        h1 { color: #ff4500; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #ff4500; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
        .msg { text-align: center; margin-top: 15px; font-weight: bold; color: #ff4500; }
    </style>
</head>
<body>

<div class="painel">
    <h1>EMISSOR DE LISTAS VIDYOU</h1>
    
    <input type="password" id="ghToken" placeholder="Seu Token (ghp_...)">
    <input type="text" id="ghRepo" placeholder="usuario/repositorio" value="roneiltonsouza/vidyou-iptv">
    
    <label>Cole o Link URL da Lista M3U:</label>
    <textarea id="m3uLink" placeholder="https://exemplo.com/lista.m3u"></textarea>
    
    <button onclick="atualizar()">ATUALIZAR TODOS OS USUÁRIOS</button>
    <div id="msg" class="msg"></div>
</div>

<script>
    async function atualizar() {
        const token = document.getElementById('ghToken').value;
        const repo = document.getElementById('ghRepo').value;
        const link = document.getElementById('m3uLink').value;
        const msg = document.getElementById('msg');

        if(!link.startsWith("http")) return alert("Cole um link válido!");
        msg.innerText = "Sincronizando...";

        try {
            // 1. Pega o SHA do arquivo atual
            const getFile = await fetch(`https://api.github.com/repos/${repo}/contents/lista.txt`, {
                headers: { 'Authorization': `token ${token}` }
            });
            const data = await getFile.json();
            
            // 2. Atualiza com o Link (Base64)
            const response = await fetch(`https://api.github.com/repos/${repo}/contents/lista.txt`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: "Atualização via Link M3U",
                    content: btoa(link),
                    sha: data.sha
                })
            });

            if (response.ok) {
                msg.innerText = "✅ Sincronizado! Todos os apps receberão a nova lista.";
            } else {
                msg.innerText = "❌ Erro ao sincronizar. Verifique o Token.";
            }
        } catch (e) {
            msg.innerText = "❌ Erro no sistema.";
        }
    }
</script>
</body>
</html>
