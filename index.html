<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel VidYou</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; display: flex; justify-content: center; padding-top: 20px; }
        .painel { width: 90%; max-width: 400px; background: #1a1a1a; padding: 20px; border-radius: 10px; border: 2px solid #ff4500; }
        h1 { color: #ff4500; text-align: center; font-size: 1.5rem; margin-bottom: 20px; }
        label { font-size: 0.8rem; color: #888; margin-top: 10px; display: block; }
        input, textarea { width: 100%; padding: 12px; margin: 8px 0; background: #000; border: 1px solid #ff4500; color: #fff; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #ff4500; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 5px; margin-top: 10px; }
    </style>
</head>
<body>
<div class="painel">
    <h1>EMISSOR VIDYOU PRO</h1>
    
    <label>ID DE ACESSO (Salvo no Navegador)</label>
    <input type="password" id="acessoID" placeholder="Digite uma vez">

    <label>GITHUB TOKEN (Salvo no Navegador)</label>
    <input type="text" id="ghToken" placeholder="ghp_...">

    <label>LINK DA LISTA M3U</label>
    <textarea id="m3uLink" placeholder="Cole o link da lista aqui"></textarea>

    <button onclick="atualizar()">ATUALIZAR SISTEMA</button>
    <div id="msg" style="text-align:center; margin-top:15px; color:#ff4500;"></div>
</div>

<script>
    // Carrega os dados salvos assim que abre a página
    window.onload = () => {
        if(localStorage.getItem('vidyou_token')) document.getElementById('ghToken').value = localStorage.getItem('vidyou_token');
        if(localStorage.getItem('vidyou_id')) document.getElementById('acessoID').value = localStorage.getItem('vidyou_id');
    }

    async function atualizar() {
        const acesso = document.getElementById('acessoID').value;
        const token = document.getElementById('ghToken').value;
        const repo = "roneiltonsouza/vidyou-iptv";
        const link = document.getElementById('m3uLink').value.trim();
        const msg = document.getElementById('msg');

        // Salva para não precisar digitar de novo
        localStorage.setItem('vidyou_token', token);
        localStorage.setItem('vidyou_id', acesso);

        if (acesso !== "1234567890") { 
            msg.innerText = "❌ ID INCORRETO!";
            return;
        }

        try {
            msg.innerText = "⏳ Sincronizando...";
            const url = `https://api.github.com/repos/${repo}/contents/lista.txt`;
            const res = await fetch(url, { headers: { 'Authorization': `token ${token}` } });
            const data = await res.json();
            
            const update = await fetch(url, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: "Update List", content: btoa(link), sha: data.sha })
            });

            if (update.ok) {
                msg.style.color = "#00ff00";
                msg.innerText = "✅ SINCRONIZADO!";
            } else { msg.innerText = "❌ Erro. Verifique o Token."; }
        } catch (e) { msg.innerText = "❌ Falha na conexão."; }
    }
</script>
</body>
</html>
