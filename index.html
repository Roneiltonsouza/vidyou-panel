<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel VidYou IPTV</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; }
        .container { max-width: 500px; margin: auto; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: none; }
        button { background: #ff4500; color: #fff; font-weight: bold; cursor: pointer; }
        .list-item { background: #111; padding: 10px; margin: 5px 0; border-radius: 5px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div class="container">
    <h2>Painel VidYou IPTV</h2>
    <input type="text" id="nome-lista" placeholder="Nome da Lista">
    <input type="text" id="url-lista" placeholder="URL da Lista M3U">
    <button onclick="salvarLista()">SALVAR NO PAINEL</button>
    <hr>
    <div id="lista-container"></div>
</div>

<script>
    // URL do seu player hospedado
    const urlVidYou = "https://roneiltonsouza.github.io/vidyou-iptv/";

    function salvarLista() {
        const nome = document.getElementById('nome-lista').value;
        const url = document.getElementById('url-lista').value;
        if (!nome || !url) return alert("Preencha todos os campos!");

        let listas = JSON.parse(localStorage.getItem('minhas_listas') || '[]');
        listas.push({ nome, url });
        localStorage.setItem('minhas_listas', JSON.stringify(listas));
        renderizar();
    }

    function sincronizar(url) {
        if (!url) return alert("URL inválida!");
        // Constrói a URL final enviando para o Player
        const base = urlVidYou.endsWith('/') ? urlVidYou : urlVidYou + '/';
        const finalUrl = base + "?lista=" + encodeURIComponent(url);
        window.open(finalUrl, '_blank');
    }

    function renderizar() {
        const container = document.getElementById('lista-container');
        const listas = JSON.parse(localStorage.getItem('minhas_listas') || '[]');
        container.innerHTML = listas.map((item, index) => `
            <div class="list-item">
                <span>${item.nome}</span>
                <button style="width:auto" onclick="sincronizar('${item.url}')">SINCRONIZAR</button>
            </div>
        `).join('');
    }

    window.onload = renderizar;
</script>
</body>
</html>
