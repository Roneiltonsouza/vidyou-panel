<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Vidyou Painel Oficial</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; padding: 20px; text-align: center; }
        .container { max-width: 400px; margin: auto; background: #111; padding: 20px; border-radius: 10px; border: 1px solid #ff4500; }
        input { width: 90%; padding: 12px; margin: 10px 0; background: #000; color: #fff; border: 1px solid #333; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-salvar { background: #ff4500; color: #000; }
        .btn-abrir { background: #00ff00; color: #000; margin-top: 10px; }
        iframe { width: 1px; height: 1px; border: none; visibility: hidden; }
    </style>
</head>
<body>

<div class="container">
    <h2>PAINEL DE ATIVAÇÃO</h2>
    <input type="text" id="nome-lista" placeholder="Nome da Lista">
    <button onclick="document.getElementById('file-input').click()" style="background:#333; color:#fff;">📁 GALERIA</button>
    <input type="file" id="file-input" style="display:none" accept=".m3u" onchange="ler(event)">
    <button class="btn-salvar" onclick="salvar()">💾 SALVAR LISTA</button>

    <div id="area-lista" style="margin-top:20px; border-top: 1px solid #222; padding-top:10px; display:none;">
        <span id="display-nome"></span><br>
        <button class="btn-abrir" onclick="ativarNoIPTV()">🚀 ABRIR E ATIVAR NO IPTV</button>
    </div>
</div>

<iframe id="iptv-receptor" src="LINK_DO_SEU_IPTV_AQUI.html"></iframe>

<script>
    let conteudoM3U = "";

    function ler(e) {
        const reader = new FileReader();
        reader.onload = (event) => { conteudoM3U = event.target.result; alert("Arquivo pronto!"); };
        reader.readAsText(e.target.files[0]);
    }

    function salvar() {
        const nome = document.getElementById('nome-lista').value;
        if(!nome || !conteudoM3U) return alert("Preencha tudo!");
        localStorage.setItem('lista_ativa', conteudoM3U);
        localStorage.setItem('nome_ativo', nome);
        document.getElementById('display-nome').innerText = "Lista: " + nome;
        document.getElementById('area-lista').style.display = 'block';
        alert("Lista salva no Painel!");
    }

    function ativarNoIPTV() {
        const conteudo = localStorage.getItem('lista_ativa');
        const nome = localStorage.getItem('nome_ativo');
        const frame = document.getElementById('iptv-receptor');
        
        // Manda a ativação direto pro arquivo do IPTV
        frame.contentWindow.postMessage({
            type: 'ativarLista',
            nome: nome,
            conteudo: conteudo
        }, '*');
        
        alert("Ativação Enviada!");
    }
</script>
</body>
</html>
