<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vidyou Painel - Gestor</title>
    <style>
        /* Força a página a ocupar exatamente 100% sem rolagens extras */
        body, html { 
            margin: 0; 
            padding: 0; 
            height: 100%; 
            width: 100%; 
            background: #000; 
            font-family: sans-serif; 
            overflow: hidden; 
        }
        
        /* Barra de controle fixa no topo */
        #barra-controle {
            height: 55px; /* Tamanho fixo para não distorcer */
            background: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            border-bottom: 2px solid #ff4500;
            z-index: 9999;
        }

        #nome-lista {
            width: 120px;
            padding: 8px;
            border-radius: 4px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
        }

        .btn {
            padding: 8px 12px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 0.8rem;
            color: #fff;
        }

        .btn-galeria { background: #444; }
        .btn-enviar { background: #ff4500; }

        /* Iframe ocupa o resto da tela perfeitamente */
        #container-app {
            width: 100%;
            height: calc(100% - 55px); /* Subtrai exatamente a altura da barra */
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }
    </style>
</head>
<body>

<div id="barra-controle">
    <input type="text" id="nome-lista" placeholder="Nome...">
    <button class="btn btn-galeria" onclick="document.getElementById('file-input').click()">GALERIA</button>
    <button class="btn btn-enviar" onclick="enviarParaIPTV()">ENVIAR</button>
    <input type="file" id="file-input" style="display:none" accept=".m3u" onchange="lerArquivo(event)">
</div>

<div id="container-app">
    <iframe id="iptv-frame" src="https://roneiltonsouza.github.io/vidyou-panel/index.html"></iframe>
</div>

<script>
    let conteudoM3U = "";

    function lerArquivo(event) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                conteudoM3U = e.target.result;
                alert("Arquivo carregado!");
            };
            reader.readAsText(file);
        }
    }

    function enviarParaIPTV() {
        const nome = document.getElementById('nome-lista').value;
        if (!conteudoM3U || !nome) {
            alert("Erro: Escolha o arquivo e digite o nome!");
            return;
        }

        // Envia para o iframe mantendo a interface original intacta
        document.getElementById('iptv-frame').contentWindow.postMessage({
            type: 'salvarLista',
            nome: nome,
            conteudo: conteudoM3U
        }, '*');
        
        alert("Lista enviada!");
    }
</script>

</body>
</html>
